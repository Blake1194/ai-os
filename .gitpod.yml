image: gitpod/workspace-node-20

tasks:
  - init: |
      cd implementation/atlas-mobile-shell
      ./scripts/bootstrap-mobile-shell.sh || true
    command: |
      cd implementation/atlas-mobile-shell
      npm run start

ports:
  - port: 8081
    onOpen: open-browser
  - port: 19000
    onOpen: open-preview
  - port: 19001
    onOpen: ignore
  - port: 19002
    onOpen: ignore
