name: atlas-mobile-shell-smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementation/atlas-mobile-shell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: implementation/atlas-mobile-shell/package.json

      - name: Install dependencies
        run: npm install

      - name: Expo dependency check
        run: npx expo install --fix --check || true
